services:
  - type: web
    name: georutas-salud-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FRONTEND_ORIGIN
        sync: false   # define la URL de Netlify en el dashboard de Render
      - key: DATABASE_PATH
        value: data/app.db
